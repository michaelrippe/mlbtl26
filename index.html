// Data helpers - Firebase deletes empty arrays/null, these normalize on read
function toArr(v) { if (!v) return []; if (Array.isArray(v)) return v; return Object.values(v); }
function cleanPicks(v) {
  if (!v) return [[],[],[],[]];
  var arr = Array.isArray(v) ? v : Object.keys(v).sort().map(function(k){return v[k]});
  while (arr.length < 4) arr.push([]);
  return arr.map(function(a) { return toArr(a).filter(function(x){return x !== "_"}) });
}
function cleanMgrs(v) {
  if (!v) return MNAMES.map(function(n){return {name:n,teams:[],wsPick:""}});
  var arr = Array.isArray(v) ? v : Object.values(v);
  return arr.map(function(m){return {name:m.name||"",teams:toArr(m.teams).filter(function(x){return x!=="_"}),wsPick:m.wsPick||""}});
}
function cleanRecs(v) {
  var o = {};
  ALL_TEAMS.forEach(function(t){ o[t] = (v && v[t]) ? {w:v[t].w||0,l:v[t].l||0} : {w:0,l:0} });
  return o;
}
function cleanOrder(v) {
  if (!v || v === "none") return null;
  if (Array.isArray(v)) return v;
  return Object.values(v);
}
function cleanDM(v) {
  if (!v) return [].concat(MNAMES);
  return Array.isArray(v) ? v : Object.values(v);
}
function normalize(d) {
  if (!d) d = {};

    managers: cleanMgrs(d.managers),

    namesLocked: !!d.namesLocked,
    prevRankings: d.prevRankings || null,
    prevRankingsDate: d.prevRankingsDate || ""

  };

<script type="text/babel">
function App() {
  const [state, setState] = React.useState(null);
  const [tab, setTab] = React.useState("standings");
  const [editRec, setEditRec] = React.useState(false);
  const [anim, setAnim] = React.useState(false);
  const [shuffled, setShuffled] = React.useState(null);
  const [cd, setCd] = React.useState({d:0,h:0,m:0,s:0,go:false});
  const [live, setLive] = React.useState(false);
  const [admin, setAdmin] = React.useState(false);
  const [pwd, setPwd] = React.useState("");
  const [pickCelebration, setPickCelebration] = React.useState(null);
  const skip = React.useRef(false);
  const prevPickCount = React.useRef(0);
  const isAdmin = pwd === "rippe26";

  const [notifPerm, setNotifPerm] = React.useState(typeof window !== "undefined" && "Notification" in window ? Notification.permission : "unavailable");

  function enableNotifs() {
    if ("Notification" in window) {
      Notification.requestPermission().then(function(p){ setNotifPerm(p); });
    }
  }

  const N="#1B2A4A",G="#C9A84C",LG="#FFF8E7",LN="#E8EDF4",GR="#2E7D32",RD="#C62828",GY="#6B7280",MG="#D1D5DB";

  // Firebase sync
  React.useEffect(() => {
    GAME.on("value", (snap) => {
      if (skip.current) { skip.current = false; return; }
      const d = snap.val();
      if (d) {
        const ns = normalize(d);
        // Migrate old names
        var nameMap = {"Schoen":"Gainzy","Rippe":"Ripcity"};
        var changed = false;
        ns.managers.forEach(function(m){if(nameMap[m.name]){m.name=nameMap[m.name];changed=true;}});
        ns.draftManagers = ns.draftManagers.map(function(n){if(nameMap[n]){changed=true;return nameMap[n];}return n;});
        if(changed){GAME.update({managers:ns.managers.map(function(m){return{name:m.name,teams:m.teams.length===0?["_"]:m.teams,wsPick:m.wsPick||""}}),draftManagers:ns.draftManagers});}
        setState(ns);
        setLive(true);
        if (ns.draftOrder) setShuffled(ns.draftOrder);
        // Browser notification on new pick
        var totalPicks = ns.draftPicks.reduce(function(a,b){return a+b.length},0);
        if (totalPicks > prevPickCount.current && prevPickCount.current > 0) {
          // Use draftRound and draftPick to find who JUST picked
          // Current draftRound/draftPick point to the NEXT pick, so we go back one
          var prevP = ns.draftPick - 1;
          var prevR = ns.draftRound;
          if (prevP < 0) { prevP = 3; prevR--; }
          if (prevR >= 0 && ns.draftOrder) {
            var b2 = ns.draftOrder;
            var snk2 = [0,1,2,3,4,5,6].map(function(i){return i%2===0?[].concat(b2):[].concat(b2).reverse()});
            var whoJustPicked = snk2[prevR][prevP];
            var pickedTeam = (ns.draftPicks[whoJustPicked] || [])[prevR] || "";
            var pickerName = ns.draftManagers[whoJustPicked] || "Someone";

            if (pickedTeam) {
              // Who's next
              var nextMgr = "";
              if (ns.draftRound < 7) {
                var nextIdx = snk2[ns.draftRound][ns.draftPick];
                nextMgr = ns.draftManagers[nextIdx] || "";
              }

              // Browser notification
              if ("Notification" in window && Notification.permission === "granted") {
                try {
                  new Notification("⚾ " + pickerName + " drafted the " + pickedTeam, {
                    body: nextMgr ? nextMgr + " is on the clock!" : "Draft complete! 🎉",
                    icon: TEAM_LOGOS[pickedTeam] || ""
                  });
                } catch(e) {}
              }

              // Show GIF celebration overlay
              setPickCelebration({team:pickedTeam, mgr:pickerName});
              setTimeout(function(){setPickCelebration(null)},4000);
            }
          }
        }
        prevPickCount.current = totalPicks;
      } else {
        GAME.set(defaultData());
        setState(normalize(defaultData()));
        setLive(true);
      }
    });
    return () => GAME.off();
  }, []);

  // Countdown
  React.useEffect(() => {
    const tick = () => {
      const diff = OPENING - new Date();
      if (diff <= 0) { setCd({d:0,h:0,m:0,s:0,go:true}); return; }
      setCd({d:Math.floor(diff/864e5),h:Math.floor((diff%864e5)/36e5),m:Math.floor((diff%36e5)/6e4),s:Math.floor((diff%6e4)/1e3),go:false});
    };
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, []);

  // Write to Firebase
  function push(up) {
    const safe = {};
    Object.keys(up).forEach(function(k) { safe[k] = up[k]; });
    if (safe.draftPicks) safe.draftPicks = safe.draftPicks.map(function(a){return a.length===0?["_"]:a});
    if (safe.managers) safe.managers = safe.managers.map(function(m){
      return {name:m.name,teams:m.teams.length===0?["_"]:m.teams,wsPick:m.wsPick||""};
    });
    if (safe.draftOrder === null) safe.draftOrder = "none";
    skip.current = true;
    const merged = {};
    if (state) Object.keys(state).forEach(function(k){merged[k]=state[k]});
    Object.keys(up).forEach(function(k){merged[k]=up[k]});
    setState(normalize(merged));
    GAME.update(safe);
  }

  if (!state) return <div style={{display:"flex",justifyContent:"center",alignItems:"center",height:"100vh",fontSize:24,color:N}}>⚾ Loading...</div>;

  const {managers:mgrs, records:recs, draftMode:dm, draftRound:dr, draftPick:dp, draftManagers:dmg, draftPicks:dpk, draftOrder:dor, draftLocked:dlk, namesLocked:nlk, prevRankings:prevRk} = state;
  const base = dor || [0,1,2,3];
  const rev = [].concat(base).reverse();
  const snake = [[].concat(base),rev,[].concat(base),[].concat(rev),[].concat(base),[].concat(rev),[].concat(base)];
  // Fix: reverse creates new array but we need fresh copies each time
  const snk = [0,1,2,3,4,5,6].map(function(i){return i%2===0?[].concat(base):[].concat(base).reverse()});

  function stats(mgr) {
    let tw=0,tl=0,bt="",bw=-1;
    (mgr.teams||[]).forEach(t => {
      const r=recs[t]||{w:0,l:0}; tw+=r.w; tl+=r.l;
      if(r.w>bw){bw=r.w;bt=t;}
    });
    return {tw,tl,pct:(tw+tl)>0?tw/(tw+tl):0,bt,bw,avg:(mgr.teams||[]).length>0?tw/(mgr.teams||[]).length:0};
  }

  const ranked = [].concat(mgrs).map(m=>({...m,s:stats(m)})).sort((a,b)=>b.s.tw-a.s.tw||b.s.bw-a.s.bw);

  // Live rosters - build from draftPicks during draft so standings/rosters update in real time
  const liveMgrs = dmg.map(function(name, i) {
    return {name: name || MNAMES[i] || "", teams: dpk[i] || [], wsPick: ""};
  });
  const liveRanked = [].concat(liveMgrs).map(m=>({...m,s:stats(m)})).sort((a,b)=>b.s.tw-a.s.tw||b.s.bw-a.s.bw);
  // Use live rosters during draft, final rosters after draft
  const displayRanked = dm || (dor && !dlk) ? liveRanked : ranked;
  const displayMgrs = dm || (dor && !dlk) ? liveMgrs : mgrs;

  const top = displayRanked[0]?displayRanked[0].s.tw:0;
  const taken = dpk.reduce((a,b)=>a.concat(b),[]);
  const avail = ALL_TEAMS.filter(t=>!taken.includes(t));
  const cur = dr<7?snk[dr][dp]:-1;
  const named = dmg.every(n=>(n||"").trim()!=="");

  // Auto-save weekly snapshot every Monday
  React.useEffect(() => {
    if (!state || !dlk) return; // only after draft is done
    const now = new Date();
    const isMonday = now.getDay() === 1;
    const lastSaved = state.prevRankingsDate || "";
    const today = now.toISOString().slice(0,10);
    if (isMonday && lastSaved !== today && displayRanked[0] && displayRanked[0].s.tw > 0) {
      const snapshot = {};
      displayRanked.forEach(function(m, i) { snapshot[m.name] = i + 1; });
      GAME.update({prevRankings: snapshot, prevRankingsDate: today});
    }
  }, [state]);

  // ===== BADGE ENGINE =====
  function computeBadges() {
    const badges = {}; // {managerName: [array of badge strings]}
    displayRanked.forEach(function(m){ badges[m.name] = []; });
    if (!dlk && !dor) return badges; // no badges before draft

    // Find all team records for each manager
    const mgrTeamData = displayRanked.map(function(m) {
      const teams = (m.teams||[]).map(function(t){ return {name:t, w:(recs[t]||{w:0}).w, l:(recs[t]||{l:0}).l}; });
      return {name:m.name, teams:teams, tw:m.s.tw, tl:m.s.tl};
    });

    // 🎯 Sharpshooter - manager with the single best team in the league
    let bestSingleW = -1, bestSingleMgr = "", bestSingleTeam = "";
    mgrTeamData.forEach(function(m){
      m.teams.forEach(function(t){
        if(t.w > bestSingleW){bestSingleW=t.w; bestSingleMgr=m.name; bestSingleTeam=t.name;}
      });
    });
    if(bestSingleW > 0 && bestSingleMgr) badges[bestSingleMgr].push("🎯 Sharpshooter (" + bestSingleTeam + " " + bestSingleW + "W)");

    // 💎 Diamond Pick - same as sharpshooter but labeled differently for best record
    if(bestSingleW > 0 && bestSingleMgr) badges[bestSingleMgr].push("💎 Diamond Pick");

    // 💩 Stinker - manager who owns the worst team in MLB (among drafted teams)
    let worstW = 9999, worstMgr = "", worstTeam = "";
    mgrTeamData.forEach(function(m){
      m.teams.forEach(function(t){
        if(t.w + t.l > 0 && t.w < worstW){worstW=t.w; worstMgr=m.name; worstTeam=t.name;}
      });
    });
    if(worstW < 9999 && worstMgr) badges[worstMgr].push("💩 Stinker (" + worstTeam + " " + worstW + "W)");

    // 💯 Century Club + 🏔️ Summit milestones

                )}

                {/* On the clock */}
                {dor && dr<7 && (
                  <div style={{background:LG,borderRadius:8,padding:"12px 20px",marginBottom:16,border:"1px solid "+G+"60",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                    <div>
                      <span style={{fontWeight:800,color:N,fontSize:14}}>Round {dr+1}</span>
                      <span style={{color:GY,margin:"0 8px"}}>·</span>
                      <span style={{fontWeight:600,color:G,fontSize:14}}>{dmg[cur]||"Manager "+(cur+1)} is on the clock</span>
                    </div>
                    <span style={{fontSize:12,color:GY}}>Pick #{dr*4+dp+1} of 28</span>
                  </div>
                )}

                {/* Draft board */}
                {dor && (
                  <div style={{background:"#fff",borderRadius:12,overflow:"hidden",border:"1px solid #E5E5E5",marginBottom:20,overflowX:"auto"}}>
                    <table style={{width:"100%",borderCollapse:"collapse",minWidth:500}}>
                      <thead><tr style={{background:N}}>
                        <th style={{padding:"10px",color:"#fff",fontSize:10,fontWeight:700,width:40}}>RD</th>
                        {dor.map((mIdx,pos)=>(
                          <th key={pos} style={{padding:"10px 16px",color:"#fff",fontSize:12,fontWeight:700}}>
                            {dmg[mIdx]||"Manager "+(mIdx+1)}
                            <div style={{fontSize:9,color:G,marginTop:2}}>Pick #{pos+1}</div>
                          </th>
                        ))}
                      </tr></thead>
                      <tbody>
                        {[0,1,2,3,4,5,6].map(rd=>(
                          <tr key={rd} style={{background:rd%2===0?"#FAFAFA":"#fff"}}>
                            <td style={{textAlign:"center",fontWeight:800,color:N,fontSize:14,padding:10,background:LN}}>{rd+1}</td>
                            {dor.map((mIdx,col)=>{
                              const tp=(dpk[mIdx]||[])[rd]||"";
                              const isCur=dr===rd&&cur===mIdx&&!tp;
                              return(
                                <td key={col} style={{padding:"10px 16px",textAlign:"center",fontSize:13,fontWeight:tp?600:400,color:tp?N:"#CCC",background:isCur?G+"25":"inherit",border:isCur?"2px solid "+G:"none"}}>{tp?teamLabel(tp,16):(isCur?"⏳":"—")}</td>
                              );
                            })}
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}

                {/* Available teams */}
                {dor && dr<7 && (
                  <div>
                    <div style={{fontSize:11,fontWeight:700,color:N,letterSpacing:1.5,marginBottom:10}}>AVAILABLE TEAMS ({avail.length} remaining)</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                      {avail.map(t=>(
                        <button key={t} onClick={()=>pick(t)} style={{
                          background:"#fff",border:"1px solid #DDD",borderRadius:6,padding:"8px 16px",
                          fontSize:13,fontWeight:500,color:N,fontFamily:"'Libre Franklin',sans-serif"
                        }} onMouseEnter={e=>{e.currentTarget.style.background=LG;e.currentTarget.style.borderColor=G}}
                           onMouseLeave={e=>{e.currentTarget.style.background="#fff";e.currentTarget.style.borderColor="#DDD"}}>{teamLabel(t,16)}</button>
                      ))}
                    </div>
                  </div>
                )}

                {/* Draft complete */}
                {dr>=7 && (
                  <div style={{textAlign:"center",padding:20,background:LG,borderRadius:10,border:"1px solid "+G}}>
                    <div style={{fontSize:24,marginBottom:4}}>🎉</div>
                    <div style={{fontSize:16,fontWeight:800,color:N}}>Draft Complete — Rosters Locked!</div>
                    <div style={{fontSize:13,color:GY,marginTop:4}}>All picks are final. Check the Standings and Rosters tabs.</div>
                    <div style={{marginTop:8,fontSize:12,color:GY}}>Undrafted: {ALL_TEAMS.filter(t=>!taken.includes(t)).join(", ")||"None"}</div>
                    <div style={{marginTop:8,fontSize:11,color:RD,fontWeight:600}}>🔒 Picks cannot be changed</div>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* MLB DATA */}
        {tab==="records" && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div style={{fontSize:11,fontWeight:700,color:N,letterSpacing:1.5}}>MLB TEAM RECORDS</div>
              <button onClick={()=>setEditRec(!editRec)} style={{background:editRec?GR:N,color:"#fff",border:"none",padding:"8px 20px",fontSize:12,fontWeight:700,borderRadius:6,fontFamily:"'Libre Franklin',sans-serif"}}>{editRec?"✓ Done":"Edit Records"}</button>
            </div>
            <div style={{background:"#fff",borderRadius:12,overflow:"hidden",border:"1px solid #E5E5E5",overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",minWidth:450}}>
                <thead><tr style={{background:N}}>
                  {["TEAM","W","L","PCT","OWNER"].map(hd=>(
                    <th key={hd} style={{padding:"10px 16px",color:hd==="L"||hd==="PCT"?"#ffffff60":"#fff",fontSize:hd==="W"?12:10,fontWeight:700,letterSpacing:1.5,textAlign:hd==="TEAM"||hd==="OWNER"?"left":"center"}}>{hd}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {[].concat(ALL_TEAMS).sort((a,b)=>(recs[b]?recs[b].w:0)-(recs[a]?recs[a].w:0)).map((t,i)=>{
                    const r=recs[t]||{w:0,l:0};
                    let owner="—";displayMgrs.forEach(m=>{if((m.teams||[]).includes(t))owner=m.name});
                    const pct=(r.w+r.l)>0?(r.w/(r.w+r.l)).toFixed(3):".000";
                    return(
                      <tr key={t} style={{background:i%2===0?"#FAFAFA":"#fff"}}>
                        <td style={{padding:"10px 16px",fontWeight:600,fontSize:13,color:N}}>{teamLabel(t,18)}</td>
                        <td style={{textAlign:"center",padding:"10px 8px"}}>
                          {editRec?(
                            <input type="number" value={r.w} onChange={e=>setRec(t,"w",e.target.value)} style={{width:55,textAlign:"center",border:"2px solid "+GR,borderRadius:4,padding:4,fontSize:14,fontWeight:800,color:GR,fontFamily:"'Libre Franklin'"}}/>
                          ):<span style={{fontWeight:800,color:GR,fontSize:15}}>{r.w}</span>}
                        </td>
                        <td style={{textAlign:"center",padding:"10px 8px"}}>
                          {editRec?(
                            <input type="number" value={r.l} onChange={e=>setRec(t,"l",e.target.value)} style={{width:50,textAlign:"center",border:"1px solid #DDD",borderRadius:4,padding:4,fontSize:11,color:"#C0C0C0",fontFamily:"'Libre Franklin'"}}/>
                          ):<span style={{color:"#C0C0C0",fontSize:11}}>{r.l}</span>}
                        </td>
                        <td style={{textAlign:"center",fontSize:11,color:"#C0C0C0"}}>{pct}</td>
                        <td style={{padding:"10px 16px",fontSize:12,color:owner==="—"?"#CCC":G,fontWeight:600}}>{owner}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </div>

      {/* GIF CELEBRATION OVERLAY */}
      {pickCelebration && (
        <div style={{position:"fixed",top:0,left:0,width:"100%",height:"100%",zIndex:9999,display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",background:"rgba(27,42,74,0.85)",animation:"fadeIn 0.3s ease"}}>
          <div style={{background:"#fff",borderRadius:16,padding:"32px 48px",textAlign:"center",maxWidth:420,boxShadow:"0 20px 60px rgba(0,0,0,0.4)"}}>
            <img src={TEAM_LOGOS[pickCelebration.team]||""} alt={pickCelebration.team} style={{width:100,height:100,objectFit:"contain",marginBottom:16}} onError={function(e){e.target.style.display="none"}}/>
            <div style={{fontSize:12,color:GY,fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>DRAFTED BY {pickCelebration.mgr.toUpperCase()}</div>
            <div style={{fontSize:28,fontWeight:900,color:N,fontFamily:"'Playfair Display',serif",marginBottom:16}}>The {pickCelebration.team}!</div>
            <img src={TEAM_GIFS[pickCelebration.team]||""} alt="celebration" style={{width:"100%",maxWidth:300,borderRadius:10,marginBottom:12}} onError={function(e){e.target.style.display="none"}}/>
            <div style={{fontSize:11,color:GY}}>Auto-closing in a moment...</div>
          </div>
        </div>
      )}

      <div style={{textAlign:"center",padding:"24px 0 32px",fontSize:11,color:GY}}>MLB Team League 2026 · Est. 2015 · $225 Prize Pool · Defending Champ: Ripcity</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
