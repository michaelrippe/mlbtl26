              <div style={{background:N,padding:"12px 20px",display:"flex",alignItems:"center",gap:12}}>
                <span style={{color:G,fontSize:16,fontWeight:900,fontFamily:"'Playfair Display',serif"}}>{section.icon}</span>
                <span style={{color:"#fff",fontSize:12,fontWeight:700,letterSpacing:1}}>{section.title}</span>
              </div>
              <div style={{padding:"16px 20px"}}>
                {section.items.map(function(item,i){return <div key={i} style={{fontSize:12,color:GY,lineHeight:1.7,marginBottom:6,paddingLeft:10,borderLeft:"2px solid "+(i===0?G:"transparent")}}>
                  {item}
                </div>})}
              </div>
            </div>})}
          </div>

          {/* KEY DATES */}
          <div style={{background:"#fff",borderRadius:12,overflow:"hidden",border:"1px solid #E5E5E5",marginBottom:24}}>
            <div style={{background:N,padding:"12px 20px"}}><span style={{color:"#fff",fontSize:12,fontWeight:700}}>KEY DATES - 2026 SEASON</span></div>
            <div style={{padding:"16px 20px",display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(200px, 1fr))",gap:12}}>
              {[
                {date:"Mar 16",label:"Draft Night",status:"COMPLETE"},
                {date:"Mar 25",label:"Opening Day - NYY @ SF",status:"3 DAYS"},
                {date:"Jul 14",label:"All-Star Break",status:"UPCOMING"},
                {date:"Jul 31",label:"Trade Deadline",status:"UPCOMING"},
                {date:"Sep 27",label:"Regular Season Ends",status:"UPCOMING"},
                {date:"Oct",label:"World Series",status:"UPCOMING"}
              ].map(function(d){return <div key={d.label} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0"}}>
                <div style={{minWidth:50,fontSize:13,fontWeight:800,color:N}}>{d.date}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,fontWeight:600,color:N}}>{d.label}</div>
                </div>
                <span style={{fontSize:9,fontWeight:700,color:d.status==="COMPLETE"?GR:d.status==="3 DAYS"?G:GY,letterSpacing:1}}>{d.status}</span>
              </div>})}
            </div>
          </div>

          {/* EXPANDING - SIGN UP */}
          <div style={{marginTop:24,background:"#fff",borderRadius:12,overflow:"hidden",border:"1px solid #E5E5E5",marginBottom:24}}>
            <div style={{background:N,padding:"12px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{color:"#fff",fontSize:12,fontWeight:700}}>COMING SOON - MORE LEAGUES</span>
              <span style={{color:G,fontSize:9}}>SIGN UP FOR EARLY ACCESS</span>
            </div>
            <div style={{padding:"16px 20px"}}>
              <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap",justifyContent:"center"}}>
                {[
                  {name:"NFL",logo:"https://a.espncdn.com/combiner/i?img=/i/teamlogos/leagues/500/nfl.png&w=100",when:"Fall 2026"},
                  {name:"NBA",logo:"https://a.espncdn.com/combiner/i?img=/i/teamlogos/leagues/500/nba.png&w=100",when:"Fall 2026"},
                  {name:"World Cup",logo:"https://upload.wikimedia.org/wikipedia/en/thumb/e/e3/2026_FIFA_World_Cup_logo.svg/250px-2026_FIFA_World_Cup_logo.svg.png",when:"Summer 2026"},
                  {name:"NHL",logo:"https://a.espncdn.com/combiner/i?img=/i/teamlogos/leagues/500/nhl.png&w=100",when:"2027"}
                ].map(function(lg){
                  var sel=signLeagues.includes(lg.name);
                  return <div key={lg.name} onClick={function(){toggleLeague(lg.name)}} style={{textAlign:"center",padding:"12px 16px",borderRadius:10,border:sel?"2px solid "+G:"1px solid #E5E5E5",cursor:"pointer",minWidth:80}}>
                    <img src={lg.logo} alt={lg.name} style={{width:36,height:36,objectFit:"contain",marginBottom:4}} onError={function(e){e.target.style.display="none"}}/>
                    <div style={{fontSize:11,fontWeight:700,color:N}}>{lg.name}</div>
                    <div style={{fontSize:8,color:sel?GR:GY}}>{sel?"SELECTED":lg.when}</div>
                  </div>
                })}
              </div>
              {signSent?<div style={{textAlign:"center",padding:"12px",fontSize:13,color:GR,fontWeight:600}}>You're on the list!</div>:
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <input value={signName} onChange={function(e){setSignName(e.target.value)}} placeholder="Name" style={{flex:1,minWidth:100,padding:"8px 12px",border:"1px solid #DDD",borderRadius:6,fontSize:12,fontFamily:"'Libre Franklin',sans-serif"}}/>
                <input value={signEmail} onChange={function(e){setSignEmail(e.target.value)}} placeholder="Email" type="email" style={{flex:2,minWidth:150,padding:"8px 12px",border:"1px solid #DDD",borderRadius:6,fontSize:12,fontFamily:"'Libre Franklin',sans-serif"}}/>
                <button onClick={submitSignup} disabled={!signName.trim()||!signEmail.trim()} style={{background:signName.trim()&&signEmail.trim()?G:MG,color:signName.trim()&&signEmail.trim()?N:"#999",border:"none",borderRadius:6,padding:"8px 20px",fontSize:11,fontWeight:700,fontFamily:"'Libre Franklin',sans-serif"}}>SIGN UP</button>
              </div>}
            </div>
          </div>

          {/* SUPPORT THE LEAGUE */}
          <div style={{background:N,borderRadius:12,padding:"24px",textAlign:"center"}}>
            <div style={{fontSize:11,color:G,fontWeight:700,letterSpacing:3,marginBottom:6}}>SUPPORT THE LEAGUE</div>
            <div style={{fontSize:18,fontWeight:900,color:"#fff",fontFamily:"'Playfair Display',serif",marginBottom:6}}>Buy the Commissioner a Coffee</div>
            <a href="https://venmo.com/michaelrippe?txn=pay&amount=1&note=MLB%20Team%20League%20Support" target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:8,background:"#008CFF",color:"#fff",textDecoration:"none",padding:"10px 28px",borderRadius:24,fontSize:13,fontWeight:700,fontFamily:"'Libre Franklin',sans-serif"}}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="#fff"><path d="M19.5 3.5c.8 1.1 1.2 2.3 1.2 3.8 0 4.7-4 10.8-7.2 15.1H6.8L4 3.8l5.4-.5 1.6 12.8c1.5-2.4 3.3-6.2 3.3-8.8 0-1.3-.2-2.2-.6-3l5.8-.8z"/></svg>
              $1 via Venmo
            </a>
            <div style={{fontSize:9,color:"#ffffff40",marginTop:8}}>@michaelrippe</div>
          </div>
        </div>}

      </div>

      <div style={{textAlign:"center",padding:"12px 0 16px",fontSize:10,color:GY}}>MLB Team League 2026 - Est. 2015 - $225 Prize Pool - Defending Champ: Ripcity</div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
