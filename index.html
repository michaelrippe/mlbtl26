<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLB Team League 2026</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚾</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Libre Franklin','Helvetica Neue',sans-serif;background:#F7F6F3}

<div id="root"></div>
<script>
// Firebase setup
firebase.initializeApp({
  apiKey:"AIzaSyC8UvEYET3uXzDNHBuOz_PoQj-pLUFEHDs",
  authDomain:"mlbtl26.firebaseapp.com",
  databaseURL:"https://mlbtl26-default-rtdb.firebaseio.com",
  projectId:"mlbtl26",
  storageBucket:"mlbtl26.firebasestorage.app",
  messagingSenderId:"609988607987",
  appId:"1:609988607987:web:7aaf6f783aad1392995c86"
});
var DB = firebase.database();
var GAME = DB.ref("game");

// Constants
var ALL_TEAMS = ["Angels","Astros","Athletics","Blue Jays","Braves","Brewers","Cardinals","Cubs","Diamondbacks","Dodgers","Giants","Guardians","Mariners","Marlins","Mets","Nationals","Orioles","Padres","Phillies","Pirates","Rangers","Rays","Red Sox","Reds","Rockies","Royals","Tigers","Twins","White Sox","Yankees"];
var MNAMES = ["G$","Swaggy","Schoen","Rippe"];
var OPENING = new Date("2026-03-25T20:05:00-04:00");

// Data helpers - Firebase deletes empty arrays/null, these normalize on read
function toArr(v) { if (!v) return []; if (Array.isArray(v)) return v; return Object.values(v); }
function cleanPicks(v) {
  if (!v) return [[],[],[],[]];
  var arr = Array.isArray(v) ? v : Object.keys(v).sort().map(function(k){return v[k]});
  while (arr.length < 4) arr.push([]);
  return arr.map(function(a) { return toArr(a).filter(function(x){return x !== "_"}) });
}
function cleanMgrs(v) {
  if (!v) return MNAMES.map(function(n){return {name:n,teams:[],wsPick:""}});
  var arr = Array.isArray(v) ? v : Object.values(v);
  return arr.map(function(m){return {name:m.name||"",teams:toArr(m.teams).filter(function(x){return x!=="_"}),wsPick:m.wsPick||""}});
}
function cleanRecs(v) {
  var o = {};
  ALL_TEAMS.forEach(function(t){ o[t] = (v && v[t]) ? {w:v[t].w||0,l:v[t].l||0} : {w:0,l:0} });
  return o;
}
function cleanOrder(v) {
  if (!v || v === "none") return null;
  if (Array.isArray(v)) return v;
  return Object.values(v);
}
function cleanDM(v) {
  if (!v) return [].concat(MNAMES);
  return Array.isArray(v) ? v : Object.values(v);
}
function normalize(d) {
  if (!d) d = {};
  return {
    managers: cleanMgrs(d.managers),
    records: cleanRecs(d.records),
    draftMode: !!d.draftMode,
    draftRound: d.draftRound || 0,
    draftPick: d.draftPick || 0,
    draftManagers: cleanDM(d.draftManagers),
    draftPicks: cleanPicks(d.draftPicks),
    draftOrder: cleanOrder(d.draftOrder),
    draftLocked: !!d.draftLocked,
    namesLocked: !!d.namesLocked
  };
}
function defaultData() {
  var r = {};
  ALL_TEAMS.forEach(function(t){r[t]={w:0,l:0}});
  return {
    managers: MNAMES.map(function(n){return {name:n,teams:["_"],wsPick:""}}),
    records: r, draftMode: false, draftRound: 0, draftPick: 0,
    draftManagers: [].concat(MNAMES),
    draftPicks: [["_"],["_"],["_"],["_"]],
    draftOrder: "none", draftLocked: false, namesLocked: false
  };
}
</script>
<script type="text/babel">
function App() {
  const [state, setState] = React.useState(null);
  const [tab, setTab] = React.useState("standings");
  const [editRec, setEditRec] = React.useState(false);
  const [anim, setAnim] = React.useState(false);
  const [shuffled, setShuffled] = React.useState(null);
  const [cd, setCd] = React.useState({d:0,h:0,m:0,s:0,go:false});
  const [live, setLive] = React.useState(false);
  const [admin, setAdmin] = React.useState(false);
  const [pwd, setPwd] = React.useState("");
  const skip = React.useRef(false);
  const isAdmin = pwd === "rippe26";

  const N="#1B2A4A",G="#C9A84C",LG="#FFF8E7",LN="#E8EDF4",GR="#2E7D32",RD="#C62828",GY="#6B7280",MG="#D1D5DB";

  // Firebase sync
  React.useEffect(() => {
    GAME.on("value", (snap) => {
      if (skip.current) { skip.current = false; return; }
      const d = snap.val();
      if (d) {
        const ns = normalize(d);
        setState(ns);
        setLive(true);
        if (ns.draftOrder) setShuffled(ns.draftOrder);
      } else {
        GAME.set(defaultData());
        setState(normalize(defaultData()));
        setLive(true);
      }
    });
    return () => GAME.off();
  }, []);

  // Countdown
  React.useEffect(() => {
    const tick = () => {
      const diff = OPENING - new Date();
      if (diff <= 0) { setCd({d:0,h:0,m:0,s:0,go:true}); return; }
      setCd({d:Math.floor(diff/864e5),h:Math.floor((diff%864e5)/36e5),m:Math.floor((diff%36e5)/6e4),s:Math.floor((diff%6e4)/1e3),go:false});
    };
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, []);

  // Write to Firebase
  function push(up) {
    const safe = {};
    Object.keys(up).forEach(function(k) { safe[k] = up[k]; });
    if (safe.draftPicks) safe.draftPicks = safe.draftPicks.map(function(a){return a.length===0?["_"]:a});
    if (safe.managers) safe.managers = safe.managers.map(function(m){
      return {name:m.name,teams:m.teams.length===0?["_"]:m.teams,wsPick:m.wsPick||""};
    });
    if (safe.draftOrder === null) safe.draftOrder = "none";
    skip.current = true;
    const merged = {};
    if (state) Object.keys(state).forEach(function(k){merged[k]=state[k]});
    Object.keys(up).forEach(function(k){merged[k]=up[k]});
    setState(normalize(merged));
    GAME.update(safe);
  }

  if (!state) return <div style={{display:"flex",justifyContent:"center",alignItems:"center",height:"100vh",fontSize:24,color:N}}>⚾ Loading...</div>;

  const {managers:mgrs, records:recs, draftMode:dm, draftRound:dr, draftPick:dp, draftManagers:dmg, draftPicks:dpk, draftOrder:dor, draftLocked:dlk, namesLocked:nlk} = state;
  const base = dor || [0,1,2,3];
  const rev = [].concat(base).reverse();
  const snake = [[].concat(base),rev,[].concat(base),[].concat(rev),[].concat(base),[].concat(rev),[].concat(base)];
  // Fix: reverse creates new array but we need fresh copies each time
  const snk = [0,1,2,3,4,5,6].map(function(i){return i%2===0?[].concat(base):[].concat(base).reverse()});

  function stats(mgr) {
    let tw=0,tl=0,bt="",bw=-1;
    (mgr.teams||[]).forEach(t => {
      const r=recs[t]||{w:0,l:0}; tw+=r.w; tl+=r.l;
      if(r.w>bw){bw=r.w;bt=t;}
    });
    return {tw,tl,pct:(tw+tl)>0?tw/(tw+tl):0,bt,bw,avg:(mgr.teams||[]).length>0?tw/(mgr.teams||[]).length:0};
  }

  const ranked = [].concat(mgrs).map(m=>({...m,s:stats(m)})).sort((a,b)=>b.s.tw-a.s.tw||b.s.bw-a.s.bw);
  const top = ranked[0]?ranked[0].s.tw:0;
  const taken = dpk.reduce((a,b)=>a.concat(b),[]);
  const avail = ALL_TEAMS.filter(t=>!taken.includes(t));
  const cur = dr<7?snk[dr][dp]:-1;
  const named = dmg.every(n=>(n||"").trim()!=="");

  function pick(team) {
    if(cur<0||dlk||taken.includes(team))return;
    const np=dpk.map(a=>[].concat(a));
    np[cur].push(team);
    let nP=dp+1,nR=dr;
    if(nP>=4){nP=0;nR++;}
    const up={draftPicks:np,draftPick:nP,draftRound:nR,namesLocked:true};
    if(nR>=7){
      up.managers=mgrs.map((m,i)=>({name:dmg[i]||m.name,teams:np[i],wsPick:""}));
      up.draftLocked=true;up.draftMode=false;
    }
    push(up);
  }

  function startDraft() {
    if(dlk)return;
    push({draftRound:0,draftPick:0,draftPicks:[[],[],[],[]],draftManagers:mgrs.map((m,i)=>m.name||MNAMES[i]||""),namesLocked:false,draftOrder:null,draftMode:true,draftLocked:false});
    setShuffled(null);setAnim(false);setTab("draft");
  }

  function doRandomize() {
    if(dor!==null||!named)return;
    setAnim(true);
    let ct=0;
    const si=setInterval(()=>{
      const t=[0,1,2,3];
      for(let i=3;i>0;i--){const j=Math.floor(Math.random()*(i+1));const tmp=t[i];t[i]=t[j];t[j]=tmp;}
      setShuffled([].concat(t));ct++;
      if(ct>=15){
        clearInterval(si);
        const f=[0,1,2,3];
        for(let i=3;i>0;i--){const j=Math.floor(Math.random()*(i+1));const tmp=f[i];f[i]=f[j];f[j]=tmp;}
        setShuffled(f);push({draftOrder:f,namesLocked:true});
        setTimeout(()=>setAnim(false),500);
      }
    },120);
  }

  function undo() {
    if(!isAdmin)return;
    let pP=dp-1,pR=dr;
    if(pP<0){pP=3;pR--;}
    if(pR<0)return;
    const who=snk[pR][pP];
    const np=dpk.map(a=>[].concat(a));
    if(!np[who]||np[who].length===0)return;
    np[who].pop();
    push({draftPicks:np,draftPick:pP,draftRound:pR});
  }

  function setDM(i,v) {
    if(nlk)return;
    const nm=[].concat(dmg);nm[i]=v;push({draftManagers:nm});
  }

  function setRec(team,f,v) {
    const nr={};
    ALL_TEAMS.forEach(function(t){nr[t]={w:recs[t].w,l:recs[t].l}});
    nr[team][f]=parseInt(v)||0;
    push({records:nr});
  }

  const ttabs=[{id:"standings",l:"Standings"},{id:"rosters",l:"Rosters"},{id:"draft",l:"Draft Board"},{id:"records",l:"MLB Data"}];
  const pad = (v) => String(v).padStart(2,"0");

  return (
    <div style={{fontFamily:"'Libre Franklin',sans-serif",background:"#F7F6F3",minHeight:"100vh"}}>
      {/* HEADER */}
      <div style={{background:N,padding:"28px 32px 20px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:0,right:0,width:300,height:"100%",background:"linear-gradient(135deg,transparent 40%,"+G+"15)",pointerEvents:"none"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",position:"relative"}}>
          <div>
            <div style={{color:G,fontSize:11,fontWeight:700,letterSpacing:4,textTransform:"uppercase",marginBottom:4}}>⚾ The Official</div>
            <h1 style={{color:"#fff",fontSize:32,fontWeight:900,margin:0,fontFamily:"'Playfair Display',serif"}}>MLB Team League <span style={{color:G}}>2026</span></h1>
          </div>
          <div style={{color:G,fontSize:12,fontWeight:600,letterSpacing:1,textAlign:"right"}}>
            DEFENDING CHAMP: RIPPE
            <div style={{fontSize:10,color:"#ffffff80",marginTop:2}}>
              Est. 2015{" "}
              <span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:live?GR:RD,marginLeft:6,animation:"pulse 2s infinite"}}/>
              <span style={{color:live?"#4CAF50":RD,fontSize:9,fontWeight:700,marginLeft:4}}>{live?"LIVE":""}</span>
            </div>
          </div>
        </div>

        {/* COUNTDOWN */}
        <div style={{marginTop:16,background:G+"15",borderRadius:8,padding:"12px 20px",display:"flex",justifyContent:"center",alignItems:"center",gap:24,border:"1px solid "+G+"30",flexWrap:"wrap"}}>
          <div style={{fontSize:11,color:G,fontWeight:700,letterSpacing:2}}>{cd.go?"⚾ SEASON IS LIVE":"FIRST PITCH — NYY @ SF"}</div>
          {!cd.go ? (
            <div style={{display:"flex",gap:16}}>
              {[{v:cd.d,l:"DAYS"},{v:cd.h,l:"HRS"},{v:cd.m,l:"MIN"},{v:cd.s,l:"SEC"}].map(x=>(
                <div key={x.l} style={{textAlign:"center"}}>
                  <div style={{fontSize:22,fontWeight:900,color:"#fff",fontFamily:"'Playfair Display',serif",lineHeight:1}}>{pad(x.v)}</div>
                  <div style={{fontSize:8,color:G,fontWeight:700,letterSpacing:1.5,marginTop:2}}>{x.l}</div>
                </div>
              ))}
            </div>
          ) : <div style={{fontSize:14,fontWeight:800,color:"#fff"}}>March 25, 2026 · 8:05 PM ET · Netflix</div>}
          <div style={{fontSize:10,color:"#ffffff60"}}>MAR 25 · 8:05 PM ET</div>
        </div>

        {/* TABS */}
        <div style={{display:"flex",gap:0,marginTop:20,borderBottom:"2px solid "+G+"33"}}>
          {ttabs.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              background:tab===t.id?G:"transparent",color:tab===t.id?N:"#ffffff99",
              border:"none",padding:"10px 24px",fontSize:12,fontWeight:700,letterSpacing:1.5,
              textTransform:"uppercase",borderRadius:"6px 6px 0 0",fontFamily:"'Libre Franklin',sans-serif"
            }}>{t.l}</button>
          ))}
        </div>
      </div>

      <div style={{maxWidth:1100,margin:"0 auto",padding:"24px 16px"}}>

        {/* STANDINGS */}
        {tab==="standings" && (
          <div>
            <div style={{display:"flex",gap:12,marginBottom:24,flexWrap:"wrap"}}>
              {[["Reg Season","$150","$50 entry"],["World Series","$75","$25 entry"],["Best Team","🏆","Bragging Rights"]].map(x=>(
                <div key={x[0]} style={{flex:1,minWidth:180,background:"#fff",borderRadius:10,padding:"16px 20px",border:"1px solid "+G+"40"}}>
                  <div style={{fontSize:11,color:GY,fontWeight:600,letterSpacing:1,textTransform:"uppercase"}}>{x[0]}</div>
                  <div style={{fontSize:28,fontWeight:900,color:N,fontFamily:"'Playfair Display',serif",marginTop:4}}>{x[1]}</div>
                  <div style={{fontSize:11,color:GY,marginTop:2}}>{x[2]}</div>
                </div>
              ))}
            </div>
            <div style={{background:"#fff",borderRadius:12,overflow:"hidden",border:"1px solid #E5E5E5"}}>
              <div style={{background:N,padding:"14px 24px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{color:"#fff",fontSize:14,fontWeight:700}}>LEAGUE STANDINGS</span>
                <span style={{color:G,fontSize:11}}>7 TEAMS PER MANAGER</span>
              </div>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead><tr style={{background:LN}}>
                  {["RK","MANAGER","W","L","PCT","GB","AVG W","BEST TEAM"].map(h=>(
                    <th key={h} style={{padding:"10px 16px",fontSize:10,fontWeight:700,color:N,letterSpacing:1.5,textAlign:h==="MANAGER"?"left":"center"}}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {ranked.map((m,i)=>{
                    const gb=i===0?"—":(top-m.s.tw);
                    return(
                      <tr key={m.name||i} style={{background:i===0?LG:i%2===0?"#FAFAFA":"#fff"}}>
                        <td style={{padding:"14px 16px",textAlign:"center",fontWeight:800,fontSize:18,color:i===0?G:N,fontFamily:"'Playfair Display',serif"}}>{i+1}</td>
                        <td style={{padding:"14px 16px",fontWeight:700,fontSize:15,color:N}}>{m.name||"—"}{i===0?" 👑":""}</td>
                        <td style={{textAlign:"center",fontWeight:800,fontSize:16,color:GR}}>{m.s.tw}</td>
                        <td style={{textAlign:"center",color:GY}}>{m.s.tl}</td>
                        <td style={{textAlign:"center",fontWeight:600,color:N}}>{m.s.pct.toFixed(3)}</td>
                        <td style={{textAlign:"center",color:typeof gb==="number"?RD:GY,fontWeight:600}}>{gb}</td>
                        <td style={{textAlign:"center",fontSize:13,color:GY}}>{m.s.avg.toFixed(1)}</td>
                        <td style={{textAlign:"center",fontSize:13,fontWeight:600,color:N}}>{m.s.bt}{m.s.bw>0?" ("+m.s.bw+"W)":""}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <div style={{marginTop:24,padding:"16px 20px",background:"#fff",borderRadius:10,border:"1px solid #E5E5E5"}}>
              <div style={{fontSize:11,fontWeight:700,color:N,letterSpacing:1.5,marginBottom:8}}>LEAGUE RULES</div>
              <div style={{fontSize:12,color:GY,lineHeight:1.8}}>
                Snake draft (7 rds) · 4 managers · 28 teams drafted · Highest total wins = champion · Tiebreaker: In the event of a tie, the manager with the team with the most wins wins · Entry: $75/mgr ($50 reg + $25 WS) · Prize pool: $225 · <span style={{fontWeight:700,color:G}}>Draft Day: March 11, 2026</span>
              </div>
            </div>
          </div>
        )}

        {/* ROSTERS */}
        {tab==="rosters" && (
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(240px, 1fr))",gap:16}}>
            {ranked.map((m,mi)=>(
              <div key={m.name||mi} style={{background:"#fff",borderRadius:12,overflow:"hidden",border:"1px solid #E5E5E5"}}>
                <div style={{background:N,padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{color:"#fff",fontWeight:700,fontSize:15}}>{m.name||"—"}</span>
                  <span style={{color:G,fontWeight:800,fontSize:18,fontFamily:"'Playfair Display',serif"}}>{m.s.tw}W</span>
                </div>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead><tr style={{background:LN}}>
                    <th style={{padding:"8px 14px",fontSize:10,fontWeight:700,color:N,textAlign:"left"}}>TEAM</th>
                    <th style={{padding:"8px 10px",fontSize:10,fontWeight:700,color:N,textAlign:"center"}}>W</th>
                    <th style={{padding:"8px 10px",fontSize:10,fontWeight:700,color:N,textAlign:"center"}}>L</th>
                  </tr></thead>
                  <tbody>
                    {[].concat(m.teams||[]).sort((a,b)=>(recs[b]?recs[b].w:0)-(recs[a]?recs[a].w:0)).map((t,ti)=>{
                      const r=recs[t]||{w:0,l:0};
                      return(<tr key={t} style={{background:ti%2===0?"#FAFAFA":"#fff",borderLeft:t===m.s.bt?"3px solid "+G:"3px solid transparent"}}>
                        <td style={{padding:"10px 14px",fontSize:13,color:N}}>{t}</td>
                        <td style={{textAlign:"center",fontSize:13,fontWeight:700,color:GR}}>{r.w}</td>
                        <td style={{textAlign:"center",fontSize:13,color:GY}}>{r.l}</td>
                      </tr>);
                    })}
                  </tbody>
                  <tfoot><tr style={{background:LG}}>
                    <td style={{padding:"10px 14px",fontWeight:700,fontSize:12,color:N}}>TOTAL</td>
                    <td style={{textAlign:"center",fontWeight:800,fontSize:14,color:GR}}>{m.s.tw}</td>
                    <td style={{textAlign:"center",fontWeight:700,fontSize:13,color:N}}>{m.s.tl}</td>
                  </tr></tfoot>
                </table>
              </div>
            ))}
          </div>
        )}

        {/* DRAFT */}
        {tab==="draft" && (
          <div>
            {/* ADMIN - always visible */}
            <div style={{display:"flex",justifyContent:"flex-end",marginBottom:16}}>
              {!admin ? (
                <button onClick={()=>setAdmin(true)} style={{background:"#fff",border:"1px solid #CCC",borderRadius:6,padding:"8px 14px",fontSize:11,color:GY,fontFamily:"'Libre Franklin',sans-serif"}}>⚙ Admin</button>
              ) : (
                <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 16px",background:"#fff",borderRadius:8,border:"1px solid "+RD}}>
                  <span style={{fontSize:11,fontWeight:700,color:RD}}>ADMIN</span>
                  {!isAdmin ? (
                    <input type="password" placeholder="Password" value={pwd} onChange={e=>setPwd(e.target.value)} style={{padding:"6px 10px",border:"1px solid #DDD",borderRadius:6,fontSize:12,width:120,fontFamily:"'Libre Franklin',sans-serif"}}/>
                  ) : (
                    <button onClick={undo} style={{background:RD,color:"#fff",border:"none",borderRadius:6,padding:"8px 16px",fontSize:12,fontWeight:700,fontFamily:"'Libre Franklin',sans-serif"}}>↩ UNDO LAST PICK</button>
                  )}
                  <button onClick={()=>{setAdmin(false);setPwd("")}} style={{background:"transparent",border:"none",fontSize:14,color:GY}}>✕</button>
                </div>
              )}
            </div>

            {!dm ? (
              <div style={{textAlign:"center",padding:40}}>
                <div style={{fontSize:18,fontWeight:700,color:N,marginBottom:12}}>{dlk?"2026 Draft Complete":"Ready to draft for 2026?"}</div>
                <div style={{fontSize:15,fontWeight:700,color:G,marginBottom:8}}>📅 DRAFT DAY: March 11, 2026</div>
                <div style={{fontSize:13,color:GY,marginBottom:24}}>Snake format · 7 rounds · 4 managers · 28 picks</div>
                {dlk ? (
                  <div style={{color:RD,fontSize:13,fontWeight:600}}>🔒 All picks are final and locked in</div>
                ) : (
                  <button onClick={startDraft} style={{background:G,color:N,border:"none",padding:"14px 36px",fontSize:14,fontWeight:800,borderRadius:8,letterSpacing:1,fontFamily:"'Libre Franklin',sans-serif"}}>START DRAFT</button>
                )}
              </div>
            ) : (
              <div>
                {/* Manager inputs */}
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
                  {dmg.map((name,i)=>(
                    <div key={i}>
                      <div style={{fontSize:10,fontWeight:700,color:GY,letterSpacing:1,marginBottom:4}}>MANAGER {i+1}</div>
                      <input value={name||""} onChange={e=>setDM(i,e.target.value)} placeholder={"Manager "+(i+1)} disabled={nlk} style={{
                        width:"100%",padding:"10px 12px",border:cur===i&&dor?"2px solid "+G:"1px solid #DDD",
                        borderRadius:6,fontSize:14,fontWeight:600,color:N,boxSizing:"border-box",
                        background:nlk?"#F3F3F3":(cur===i&&dor?LG:"#fff"),
                        fontFamily:"'Libre Franklin',sans-serif",opacity:nlk?0.8:1}}/>
                    </div>
                  ))}
                </div>

                {/* Randomizer */}
                {!dor && (
                  <div style={{textAlign:"center",padding:32,background:"#fff",borderRadius:12,border:"1px solid #E5E5E5",marginBottom:20}}>
                    {shuffled ? (
                      <div style={{marginBottom:24}}>
                        <div style={{fontSize:11,fontWeight:700,color:GY,letterSpacing:2,marginBottom:16}}>{anim?"RANDOMIZING...":"DRAFT ORDER SET"}</div>
                        <div style={{display:"flex",justifyContent:"center",gap:16,flexWrap:"wrap"}}>
                          {shuffled.map((mIdx,pos)=>(
                            <div key={pos} style={{background:anim?N+"10":N,borderRadius:10,padding:"16px 20px",minWidth:100,border:"2px solid "+(anim?G+"50":G)}}>
                              <div style={{fontSize:28,fontWeight:900,color:anim?N:G,fontFamily:"'Playfair Display',serif"}}>#{pos+1}</div>
                              <div style={{fontSize:13,fontWeight:700,marginTop:4,color:anim?GY:"#fff"}}>{dmg[mIdx]||"Mgr "+(mIdx+1)}</div>
                            </div>
                          ))}
                        </div>
                      </div>
                    ) : (
                      <div>
                        <div style={{fontSize:22,marginBottom:8}}>🎲</div>
                        <div style={{fontSize:16,fontWeight:700,color:N,marginBottom:4}}>Draft Order Randomizer</div>
                        <div style={{fontSize:12,color:GY,marginBottom:20}}>Enter all 4 manager names, then click below.<br/><span style={{fontWeight:700,color:RD}}>One time only — result is final.</span></div>
                      </div>
                    )}
                    <button onClick={doRandomize} disabled={anim||!named} style={{
                      background:named&&!anim?G:MG,color:named?N:"#999",
                      border:"none",padding:"14px 40px",fontSize:14,fontWeight:800,borderRadius:8,
                      cursor:named&&!anim?"pointer":"not-allowed",fontFamily:"'Libre Franklin',sans-serif"
                    }}>{anim?"RANDOMIZING...":shuffled?"ORDER LOCKED":"🎲 RANDOMIZE DRAFT ORDER"}</button>
                    {!named&&!shuffled&&<div style={{fontSize:11,color:RD,marginTop:8}}>Enter all 4 manager names first</div>}
                  </div>
                )}

                {/* Draft order banner */}
                {dor && (
                  <div style={{background:N,borderRadius:10,padding:"14px 24px",marginBottom:16,display:"flex",justifyContent:"center",alignItems:"center",gap:24,flexWrap:"wrap"}}>
                    <span style={{fontSize:11,fontWeight:700,color:G,letterSpacing:2}}>DRAFT ORDER</span>
                    {dor.map((mIdx,pos)=>(
                      <div key={pos} style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontSize:16,fontWeight:900,color:G,fontFamily:"'Playfair Display',serif"}}>{pos+1}.</span>
                        <span style={{fontSize:13,fontWeight:600,color:"#fff"}}>{dmg[mIdx]}</span>
                      </div>
                    ))}
                    <span style={{fontSize:10,color:"#ffffff50"}}>🔒 LOCKED</span>
                  </div>
                )}

                {/* On the clock */}
                {dor && dr<7 && (
                  <div style={{background:LG,borderRadius:8,padding:"12px 20px",marginBottom:16,border:"1px solid "+G+"60",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                    <div>
                      <span style={{fontWeight:800,color:N,fontSize:14}}>Round {dr+1}</span>
                      <span style={{color:GY,margin:"0 8px"}}>·</span>
                      <span style={{fontWeight:600,color:G,fontSize:14}}>{dmg[cur]||"Manager "+(cur+1)} is on the clock</span>
                    </div>
                    <span style={{fontSize:12,color:GY}}>Pick #{dr*4+dp+1} of 28</span>
                  </div>
                )}

                {/* Draft board */}
                {dor && (
                  <div style={{background:"#fff",borderRadius:12,overflow:"hidden",border:"1px solid #E5E5E5",marginBottom:20,overflowX:"auto"}}>
                    <table style={{width:"100%",borderCollapse:"collapse",minWidth:500}}>
                      <thead><tr style={{background:N}}>
                        <th style={{padding:"10px",color:"#fff",fontSize:10,fontWeight:700,width:40}}>RD</th>
                        {dor.map((mIdx,pos)=>(
                          <th key={pos} style={{padding:"10px 16px",color:"#fff",fontSize:12,fontWeight:700}}>
                            {dmg[mIdx]||"Manager "+(mIdx+1)}
                            <div style={{fontSize:9,color:G,marginTop:2}}>Pick #{pos+1}</div>
                          </th>
                        ))}
                      </tr></thead>
                      <tbody>
                        {[0,1,2,3,4,5,6].map(rd=>(
                          <tr key={rd} style={{background:rd%2===0?"#FAFAFA":"#fff"}}>
                            <td style={{textAlign:"center",fontWeight:800,color:N,fontSize:14,padding:10,background:LN}}>{rd+1}</td>
                            {dor.map((mIdx,col)=>{
                              const tp=(dpk[mIdx]||[])[rd]||"";
                              const isCur=dr===rd&&cur===mIdx&&!tp;
                              return(
                                <td key={col} style={{padding:"10px 16px",textAlign:"center",fontSize:13,fontWeight:tp?600:400,color:tp?N:"#CCC",background:isCur?G+"25":"inherit",border:isCur?"2px solid "+G:"none"}}>{tp||(isCur?"⏳":"—")}</td>
                              );
                            })}
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}

                {/* Available teams */}
                {dor && dr<7 && (
                  <div>
                    <div style={{fontSize:11,fontWeight:700,color:N,letterSpacing:1.5,marginBottom:10}}>AVAILABLE TEAMS ({avail.length} remaining)</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                      {avail.map(t=>(
                        <button key={t} onClick={()=>pick(t)} style={{
                          background:"#fff",border:"1px solid #DDD",borderRadius:6,padding:"8px 16px",
                          fontSize:13,fontWeight:500,color:N,fontFamily:"'Libre Franklin',sans-serif"
                        }} onMouseEnter={e=>{e.currentTarget.style.background=LG;e.currentTarget.style.borderColor=G}}
                           onMouseLeave={e=>{e.currentTarget.style.background="#fff";e.currentTarget.style.borderColor="#DDD"}}>{t}</button>
                      ))}
                    </div>
                  </div>
                )}

                {/* Draft complete */}
                {dr>=7 && (
                  <div style={{textAlign:"center",padding:20,background:LG,borderRadius:10,border:"1px solid "+G}}>
                    <div style={{fontSize:24,marginBottom:4}}>🎉</div>
                    <div style={{fontSize:16,fontWeight:800,color:N}}>Draft Complete — Rosters Locked!</div>
                    <div style={{fontSize:13,color:GY,marginTop:4}}>All picks are final. Check the Standings and Rosters tabs.</div>
                    <div style={{marginTop:8,fontSize:12,color:GY}}>Undrafted: {ALL_TEAMS.filter(t=>!taken.includes(t)).join(", ")||"None"}</div>
                    <div style={{marginTop:8,fontSize:11,color:RD,fontWeight:600}}>🔒 Picks cannot be changed</div>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* MLB DATA */}
        {tab==="records" && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div style={{fontSize:11,fontWeight:700,color:N,letterSpacing:1.5}}>MLB TEAM RECORDS</div>
              <button onClick={()=>setEditRec(!editRec)} style={{background:editRec?GR:N,color:"#fff",border:"none",padding:"8px 20px",fontSize:12,fontWeight:700,borderRadius:6,fontFamily:"'Libre Franklin',sans-serif"}}>{editRec?"✓ Done":"Edit Records"}</button>
            </div>
            <div style={{background:"#fff",borderRadius:12,overflow:"hidden",border:"1px solid #E5E5E5",overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",minWidth:450}}>
                <thead><tr style={{background:N}}>
                  {["TEAM","W","L","PCT","OWNER"].map(hd=>(
                    <th key={hd} style={{padding:"10px 16px",color:"#fff",fontSize:10,fontWeight:700,letterSpacing:1.5,textAlign:hd==="TEAM"||hd==="OWNER"?"left":"center"}}>{hd}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {[].concat(ALL_TEAMS).sort((a,b)=>(recs[b]?recs[b].w:0)-(recs[a]?recs[a].w:0)).map((t,i)=>{
                    const r=recs[t]||{w:0,l:0};
                    let owner="—";mgrs.forEach(m=>{if((m.teams||[]).includes(t))owner=m.name});
                    const pct=(r.w+r.l)>0?(r.w/(r.w+r.l)).toFixed(3):".000";
                    return(
                      <tr key={t} style={{background:i%2===0?"#FAFAFA":"#fff"}}>
                        <td style={{padding:"10px 16px",fontWeight:600,fontSize:13,color:N}}>{t}</td>
                        <td style={{textAlign:"center",padding:"10px 8px"}}>
                          {editRec?(
                            <input type="number" value={r.w} onChange={e=>setRec(t,"w",e.target.value)} style={{width:50,textAlign:"center",border:"1px solid #DDD",borderRadius:4,padding:4,fontSize:13,fontWeight:700,color:GR,fontFamily:"'Libre Franklin'"}}/>
                          ):<span style={{fontWeight:700,color:GR,fontSize:13}}>{r.w}</span>}
                        </td>
                        <td style={{textAlign:"center",padding:"10px 8px"}}>
                          {editRec?(
                            <input type="number" value={r.l} onChange={e=>setRec(t,"l",e.target.value)} style={{width:50,textAlign:"center",border:"1px solid #DDD",borderRadius:4,padding:4,fontSize:13,color:GY,fontFamily:"'Libre Franklin'"}}/>
                          ):<span style={{color:GY,fontSize:13}}>{r.l}</span>}
                        </td>
                        <td style={{textAlign:"center",fontSize:13,color:N}}>{pct}</td>
                        <td style={{padding:"10px 16px",fontSize:12,color:owner==="—"?"#CCC":G,fontWeight:600}}>{owner}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </div>
      <div style={{textAlign:"center",padding:"24px 0 32px",fontSize:11,color:GY}}>MLB Team League 2026 · Est. 2015 · $225 Prize Pool · Defending Champ: Rippe</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
