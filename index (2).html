                  React.createElement("thead", null,
                    React.createElement("tr", {style:{background:NAVY}},
                      React.createElement("th", {style:{padding:"10px",color:"#fff",fontSize:10,fontWeight:700,letterSpacing:1,width:40}}, "RD"),
                      draftOrder.map((mIdx,pos) =>
                        React.createElement("th", {key:pos,style:{padding:"10px 16px",color:"#fff",fontSize:12,fontWeight:700}},
                          draftManagers[mIdx]||"Manager "+(mIdx+1),
                          React.createElement("div", {style:{fontSize:9,color:GOLD,fontWeight:400,marginTop:2}}, "Pick #"+(pos+1)))
                      )
                    )
                  ),
                  React.createElement("tbody", null,
                    [0,1,2,3,4,5,6].map(rd =>
                      React.createElement("tr", {key:rd,style:{background:rd%2===0?"#FAFAFA":"#fff"}},
                        React.createElement("td", {style:{textAlign:"center",fontWeight:800,color:NAVY,fontSize:14,padding:10,background:LIGHT_NAVY}}, rd+1),
                        draftOrder.map((mIdx,colPos) => {
                          const tp = draftPicks[mIdx]?.[rd]||"";
                          const isCur = draftRound===rd && currentDrafter===mIdx && !tp;
                          return React.createElement("td", {key:colPos,style:{
                            padding:"10px 16px",textAlign:"center",fontSize:13,
                            fontWeight:tp?600:400,color:tp?NAVY:"#CCC",
                            background:isCur?`${GOLD}25`:"inherit",
                            border:isCur?`2px solid ${GOLD}`:"none"
                          }}, tp||(isCur?"⏳":"—"));
                        })
                      )
                    )
                  )
                )
              ),
              /* Available Teams */
              draftOrder && draftRound < 7 && React.createElement("div", null,
                React.createElement("div", {style:{fontSize:11,fontWeight:700,color:NAVY,letterSpacing:1.5,marginBottom:10}}, "AVAILABLE TEAMS ("+available.length+" remaining)"),
                React.createElement("div", {style:{display:"flex",flexWrap:"wrap",gap:8}},
                  available.map(t =>
                    React.createElement("button", {key:t,onClick:()=>handlePick(t),style:{
                      background:"#fff",border:"1px solid #DDD",borderRadius:6,padding:"8px 16px",
                      fontSize:13,fontWeight:500,color:NAVY,cursor:"pointer",transition:"all 0.15s",
                      fontFamily:"'Libre Franklin',sans-serif"
                    },onMouseEnter:e=>{e.currentTarget.style.background=LIGHT_GOLD;e.currentTarget.style.borderColor=GOLD;},
                      onMouseLeave:e=>{e.currentTarget.style.background="#fff";e.currentTarget.style.borderColor="#DDD";}}, t)
                  )
                )
              ),
              /* Draft Complete */
              draftRound >= 7 && React.createElement("div", {style:{textAlign:"center",padding:20,background:LIGHT_GOLD,borderRadius:10,border:`1px solid ${GOLD}`}},
                React.createElement("div", {style:{fontSize:24,marginBottom:4}}, "🎉"),
                React.createElement("div", {style:{fontSize:16,fontWeight:800,color:NAVY}}, "Draft Complete — Rosters Locked!"),
                React.createElement("div", {style:{fontSize:13,color:GRAY,marginTop:4}}, "All picks are final. Check the Standings and Rosters tabs."),
                React.createElement("div", {style:{marginTop:8,fontSize:12,color:GRAY}}, "Undrafted: "+(ALL_TEAMS.filter(t=>!draftPicks.flat().includes(t)).join(", ")||"None")),
                React.createElement("div", {style:{marginTop:8,fontSize:11,color:RED,fontWeight:600}}, "🔒 Picks cannot be changed")
              )
            )
        ),

        /* MLB DATA TAB */
        activeTab==="records" && React.createElement("div", null,
          React.createElement("div", {style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
            React.createElement("div", {style:{fontSize:11,fontWeight:700,color:NAVY,letterSpacing:1.5}}, "MLB TEAM RECORDS"),
            React.createElement("button", {onClick:()=>setEditingRecords(!editingRecords),style:{
              background:editingRecords?GREEN:NAVY,color:"#fff",border:"none",padding:"8px 20px",
              fontSize:12,fontWeight:700,borderRadius:6,cursor:"pointer",letterSpacing:0.5,fontFamily:"'Libre Franklin',sans-serif"
            }}, editingRecords?"✓ Done":"Edit Records")
          ),
          React.createElement("div", {style:{background:"#fff",borderRadius:12,overflow:"hidden",border:"1px solid #E5E5E5",overflowX:"auto"}},
            React.createElement("table", {style:{width:"100%",borderCollapse:"collapse",minWidth:450}},
              React.createElement("thead", null,
                React.createElement("tr", {style:{background:NAVY}},
                  ["TEAM","W","L","PCT","OWNER"].map(h =>
                    React.createElement("th", {key:h,style:{padding:"10px 16px",color:"#fff",fontSize:10,fontWeight:700,letterSpacing:1.5,textAlign:h==="TEAM"||h==="OWNER"?"left":"center"}}, h))
                )
              ),
              React.createElement("tbody", null,
                [...ALL_TEAMS].sort((a,b)=>(records[b]?.w||0)-(records[a]?.w||0)).map((t,i) => {
                  const r = records[t]||{w:0,l:0};
                  const owner = managers.find(m=>m.teams.includes(t))?.name||"—";
                  const pct = (r.w+r.l)>0?(r.w/(r.w+r.l)).toFixed(3):".000";
                  return React.createElement("tr", {key:t,style:{background:i%2===0?"#FAFAFA":"#fff"}},
                    React.createElement("td", {style:{padding:"10px 16px",fontWeight:600,fontSize:13,color:NAVY}}, t),
                    React.createElement("td", {style:{textAlign:"center",padding:"10px 8px"}},
                      editingRecords ?
                        React.createElement("input", {type:"number",value:r.w,onChange:e=>setRecords(p=>({...p,[t]:{...p[t],w:parseInt(e.target.value)||0}})),
                          style:{width:50,textAlign:"center",border:"1px solid #DDD",borderRadius:4,padding:4,fontSize:13,fontWeight:700,color:GREEN,fontFamily:"'Libre Franklin'"}}) :
                        React.createElement("span", {style:{fontWeight:700,color:GREEN,fontSize:13}}, r.w)
                    ),
                    React.createElement("td", {style:{textAlign:"center",padding:"10px 8px"}},
                      editingRecords ?
                        React.createElement("input", {type:"number",value:r.l,onChange:e=>setRecords(p=>({...p,[t]:{...p[t],l:parseInt(e.target.value)||0}})),
                          style:{width:50,textAlign:"center",border:"1px solid #DDD",borderRadius:4,padding:4,fontSize:13,color:GRAY,fontFamily:"'Libre Franklin'"}}) :
                        React.createElement("span", {style:{color:GRAY,fontSize:13}}, r.l)
                    ),
                    React.createElement("td", {style:{textAlign:"center",fontSize:13,color:NAVY}}, pct),
                    React.createElement("td", {style:{padding:"10px 16px",fontSize:12,color:owner==="—"?"#CCC":GOLD,fontWeight:600}}, owner)
                  );
                })
              )
            )
          )
        )
      ),

      /* Footer */
      React.createElement("div", {style:{textAlign:"center",padding:"24px 0 32px",fontSize:11,color:GRAY}},
        "MLB Team League 2026 · Est. 2015 · $225 Prize Pool · Defending Champ: Rippe")
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
